name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - sandbox
      - aos-live

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'github-pages' || (github.ref == 'refs/heads/aos-live' && 'AOS-Live' || 'Sandbox-Env') }}
      url: ${{ steps.deployment.outputs.page_url }}${{ github.ref == 'refs/heads/sandbox' && 'sandbox/' || (github.ref == 'refs/heads/aos-live' && 'aos/' || '') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare Deployment Directory
        run: |
          mkdir -p deploy_out/sandbox
          mkdir -p deploy_out/aos
          
          # 1. Export Main to root
          git checkout main
          cp -a www/. deploy_out/
          
          # 2. Export Sandbox to /sandbox
          git checkout sandbox
          cp -a www/. deploy_out/sandbox/

          # 3. Export AOS-Live to /aos
          git checkout aos-live
          cp -a www/. deploy_out/aos/
          
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'deploy_out/'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
