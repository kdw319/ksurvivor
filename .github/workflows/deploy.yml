name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - sandbox

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Main Branch
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: main
          path: main_ref

      - name: Checkout Sandbox Branch
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: sandbox
          path: sandbox_ref

      - name: Prepare Deployment Directory
        run: |
          mkdir -p deploy_out
          
          # 1. Main branch contents to root
          if [ -d "main_ref/www" ]; then
            echo "Copying Main to root..."
            cp -a main_ref/www/. deploy_out/
          else
            echo "Main branch www directory not found."
          fi
          
          # 2. Sandbox branch contents to /sandbox folder
          if [ -d "sandbox_ref/www" ]; then
            echo "Copying Sandbox to /sandbox..."
            mkdir -p deploy_out/sandbox
            cp -a sandbox_ref/www/. deploy_out/sandbox/
          else
            echo "Sandbox branch www directory not found."
          fi
          
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'deploy_out/'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
