name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - sandbox
      - aos-live
      - aos-archive

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'github-pages' || (github.ref == 'refs/heads/aos-live' && 'AOS-Live' || (github.ref == 'refs/heads/aos-archive' && 'AOS-Archive' || 'Sandbox_Env')) }}
      url: ${{ steps.deployment.outputs.page_url }}${{ github.ref == 'refs/heads/sandbox' && 'sandbox/' || (github.ref == 'refs/heads/aos-live' && 'aos/' || (github.ref == 'refs/heads/aos-archive' && 'aos-archive/' || '')) }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare Deployment Directory
        run: |
          mkdir -p deploy_out/sandbox
          mkdir -p deploy_out/aos
          mkdir -p deploy_out/aos-archive

          # Ensure branches are available
          git fetch origin main sandbox aos-live aos-archive || true

          # Helper function to copy www from branch
          copy_branch() {
            local branch=$1
            local target=$2
            echo "Processing branch $branch -> $target"
            git checkout $branch -- www/ || echo "Branch $branch not found or failed"
            cp -a www/. $target/
            git checkout ${{ github.ref_name }} -- www/ || true # Restore current state
          }

          # 1. Export Main to root (Always use origin/main for safety)
          git show origin/main:www/index.html > /dev/null && git checkout origin/main -- www/
          cp -a www/. deploy_out/
          
          # 2. Export Sandbox to /sandbox
          copy_branch origin/sandbox deploy_out/sandbox

          # 3. Export AOS-Live to /aos
          copy_branch origin/aos-live deploy_out/aos

          # 4. Export AOS-Archive to /aos-archive
          copy_branch origin/aos-archive deploy_out/aos-archive

      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'deploy_out/'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
