<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Last Girl Survivor : 대역전의 종소리</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+KR:wght@400;700&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; overflow: hidden;
            font-family: 'Noto Sans KR', sans-serif;
            user-select: none; -webkit-user-select: none;
            touch-action: none; 
            image-rendering: pixelated; 
        }

        #gameContainer {
            position: absolute;
            top: 50%;
            left: 50%;
            background-color: #111;
            overflow: hidden;
            transform-origin: center center;
            transform: translate(-50%, -50%);
        }

        :root {
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
            --safe-left: env(safe-area-inset-left);
            --safe-right: env(safe-area-inset-right);
            --m-buffer: 220px; 
        }

        #hudLeft, #hudRight, #hudCenter, #statsPanel, #inventory, #lobbyTopBar, #lobbyBottomBar, 
        #pauseBtn, #mobileDashBtn, #minimapCanvas, #systemNoticeList, #orbPocketUI {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @media screen and (orientation: landscape) {
            #lobbyTopBar { top: 120px; padding: 0 var(--m-buffer); }
            #hudLeft { top: 150px; left: var(--m-buffer); }
            #hudRight { top: 150px; right: var(--m-buffer); }
            #pauseBtn { bottom: 150px; right: var(--m-buffer); }
            #mobileDashBtn { bottom: 300px; right: var(--m-buffer); }
            #minimapCanvas { bottom: 150px; left: var(--m-buffer); }
            #orbPocketUI { bottom: calc(150px + 165px); left: var(--m-buffer); }
            #inventory { top: 320px; left: var(--m-buffer); }
            #statsPanel { top: 300px; right: var(--m-buffer); }
            #lobbyBottomBar { bottom: 220px; flex-direction: row; justify-content: center; }
            #systemNoticeList { top: 450px; right: var(--m-buffer); }
            #btnSkip { bottom: 200px; right: var(--m-buffer); padding: 25px 50px; font-size: 1.5rem; }
        }

        @media screen and (orientation: portrait) {
            #lobbyTopBar { top: 180px; padding: 0 60px; justify-content: space-around; }
            #lobbyTitle { top: 300px; font-size: 1.6rem; }
            #hudLeft { top: 180px; left: 60px; }
            #hudRight { top: 180px; right: 60px; }
            #inventory { top: 350px; left: 50%; transform: translateX(-50%); width: 90%; justify-content: center; }
            #statsPanel { top: 480px; left: 50%; transform: translateX(-50%); width: 70%; max-height: 150px; padding: 15px; font-size: 12px; background: rgba(0,0,0,0.6); border-radius: 10px; border-left: 4px solid #b89947; }
            #lobbyBottomBar { bottom: 250px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 60px; }
            #btnStartLobby { grid-column: span 2; padding: 30px !important; }
            #mobileDashBtn { bottom: 500px; right: 80px; width: 100px; height: 100px; }
            #pauseBtn { bottom: 620px; right: 80px; }
            #minimapCanvas { bottom: 250px; left: 80px; width: 160px; height: 140px; }
            #orbPocketUI { bottom: 405px; left: 80px; }
            #btnSkip { bottom: 300px; left: 50%; transform: translateX(-50%); padding: 25px 80px; font-size: 1.5rem; }
        }

        #gameCanvas { display: block; width: 100%; height: 100%; touch-action: none; transition: filter 0.1s; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0, 0, 0, 0.8); color: white; z-index: 20; transition: opacity 0.3s; }
        .hidden { display: none !important; }
        .panel { background: #2a2a35; border: 4px solid #b89947; border-radius: 8px; padding: 30px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.8); max-width: 600px; width: 90%; position: relative; }
        h1, h2 { font-family: 'Press Start 2P', 'Noto Sans KR', cursive; color: #e0d0a0; text-shadow: 2px 2px 0 #000; margin-bottom: 20px; line-height: 1.5; }
        .btn { background: #b89947; color: #111; border: none; padding: 15px 30px; font-size: 1.2rem; font-weight: bold; cursor: pointer; margin: 10px; border-radius: 4px; font-family: 'Noto Sans KR', sans-serif; transition: transform 0.1s, background 0.2s; pointer-events: auto; }
        .btn.primary { background: #ff6b6b; color: #fff; }
        .btn:hover { background: #d4b86a; transform: scale(1.05); }
        .btn:active { transform: scale(0.95); }
        .btn:disabled { background: #555; color: #888; cursor: not-allowed; }
        #lobbyTopBar { position: absolute; top: 0; left: 0; width: 100%; padding: 20px; box-sizing: border-box; display: flex; justify-content: space-between; align-items: flex-start; z-index: 25; pointer-events: none; }
        .currency-badge { background: rgba(0,0,0,0.6); border: 2px solid #ffb142; padding: 10px 20px; border-radius: 20px; font-size: 18px; color: white; font-weight: bold; display: flex; align-items: center; gap: 10px; pointer-events: auto; }
        #lobbyBottomBar { position: absolute; bottom: 40px; width: 100%; display: flex; justify-content: center; flex-wrap: wrap; gap: 15px; z-index: 25; }
        .lobby-title { position: absolute; top: 80px; left: 50%; transform: translateX(-50%); text-align: center; z-index: 25; pointer-events: none; }
        #hudLeft { position: absolute; top: 20px; left: 20px; pointer-events: none; z-index: 5; color: white; text-shadow: 1px 1px 2px black; }
        #hudRight { position: absolute; top: 20px; right: 20px; pointer-events: none; z-index: 5; color: white; text-shadow: 1px 1px 2px black; text-align: right; display: flex; flex-direction: column; align-items: flex-end; }
        #hudCenter { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); pointer-events: none; z-index: 5; color: #e0d0a0; font-weight: bold; font-size: 18px; text-shadow: 1px 1px 2px black; background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 20px; border: 1px solid #b89947; }
        .exp-bar-container { position: absolute; top: 0; left: 0; width: 100%; height: 15px; background: #222; z-index: 6; }
        .exp-bar-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #60a5fa); width: 0%; transition: width 0.2s; }
        #inventory { position: absolute; top: 150px; left: 20px; display: flex; flex-direction: column; gap: 8px; z-index: 5; }
        .inv-item { background: rgba(0,0,0,0.7); border: 1px solid #b89947; padding: 8px 12px; color: white; font-size: 16px; border-radius: 6px; display: flex; align-items: center; gap: 10px; }
        #statsPanel { position: absolute; top: 120px; right: 20px; background: rgba(0,0,0,0.4); border-left: 3px solid #b89947; padding: 15px; color: white; font-size: 13px; z-index: 5; text-shadow: 1px 1px 1px black; min-width: 150px; }
        .stat-line { display: flex; justify-content: space-between; margin-bottom: 5px; gap: 10px; }
        .stat-val { color: #fff; font-weight: bold; }
        #systemNoticeList { position: absolute; top: 280px; right: 20px; display: flex; flex-direction: column; gap: 5px; z-index: 5; text-align: right; }
        .system-notice-item { color: #ffd700; font-weight: bold; text-shadow: 1px 1px 3px #000; animation: pop 0.5s ease-out; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 4px; }
        @keyframes pop { 0% { transform: scale(1.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        #pauseBtn { position: absolute; bottom: 20px; right: 20px; background: rgba(0,0,0,0.6); border: 2px solid #fff; color: #fff; padding: 10px 20px; border-radius: 8px; cursor: pointer; z-index: 5; font-family: 'Noto Sans KR'; pointer-events: auto; }
        #minimapCanvas { position: absolute; bottom: 20px; left: 20px; width: 150px; height: 150px; background: rgba(0, 0, 0, 0.5); border: 2px solid rgba(184, 153, 71, 0.8); border-radius: 8px; z-index: 5; pointer-events: none; }
        #mobileDashBtn { position: absolute; bottom: 100px; right: 30px; width: 70px; height: 70px; border-radius: 50%; background: rgba(0, 210, 211, 0.4); border: 3px solid #00d2d3; color: white; font-weight: bold; font-family: 'Press Start 2P', monospace; font-size: 12px; z-index: 10; display: flex; justify-content: center; align-items: center; }
        .choice-container { display: flex; justify-content: space-around; gap: 20px; margin-top: 20px; flex-wrap: wrap; }
        .choice-card { background: #333; border: 2px solid #555; padding: 20px; border-radius: 8px; cursor: pointer; width: 180px; transition: all 0.2s; display: flex; flex-direction: column; align-items: center; }
        .choice-card:hover { border-color: #b89947; background: #444; transform: translateY(-5px); }
        .choice-card.premium { border-color: #ff9ff3; background: #4a2c4a; }
        .speech-bubble { position: absolute; background: white; color: black; padding: 10px 15px; border-radius: 10px; font-weight: bold; font-size: 14px; pointer-events: none; opacity: 0; z-index: 30; }
        .slot-item { background: rgba(0,0,0,0.6); border: 1px solid #b89947; padding: 15px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; color: white; }
        .outfit-card { background: #2f3640; border: 2px solid #555; border-radius: 8px; padding: 10px; width: 120px; cursor: pointer; display:flex; flex-direction:column; align-items:center; }
        .outfit-card.equipped { border-color: #ff9ff3; background: #4a2c4a; }
        .achieve-card { background: rgba(0,0,0,0.6); border: 1px solid #555; border-left: 4px solid #555; padding: 15px; border-radius: 4px; display: flex; align-items: center; gap: 15px; }
        .achieve-card.unlocked { border-left-color: #f1c40f; background: rgba(241, 196, 15, 0.1); }
        #storyUI { background: #000; z-index: 50; }
        .typewriter-text { font-size: 1.5rem; line-height: 2; color: #fff; min-height: 120px; text-align: center; }
        .skip-btn { position: absolute; top: 20px; right: 20px; background: none; border: 1px solid #555; color: #aaa; cursor: pointer; padding: 10px; border-radius: 4px; }
        #flashOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; opacity: 0; pointer-events: none; z-index: 10000; }
        input[type=range] { -webkit-appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: #ffb142; cursor: pointer; margin-top: -6px; border: 2px solid #fff; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 6px; cursor: pointer; background: #555; border-radius: 3px; border: 1px solid #222; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
</head>
<body>

<div id="gameContainer">
    <div id="flashOverlay"></div>
    <div class="exp-bar-container"><div class="exp-bar-fill" id="expBar"></div></div>

    <div id="hudLeft" class="hidden">
        <div style="font-size: 24px; font-weight: bold; color: #ffb142;" id="stageDispUI">STAGE 1 : 낡은 재판소</div>
        <div style="font-size: 18px; margin-top: 5px;">LV: <span id="levelDisp">1</span></div>
        <div style="font-size: 18px; color: #ff6b6b; margin-top: 5px;">HP: <span id="hpDisp">100/100</span></div>
        <div style="font-size: 18px; color: #00d2d3; margin-top: 5px; font-weight: bold;">DASH: <span id="dashDisp">READY</span></div>
    </div>
    <div id="hudCenter" class="hidden">진행도: <span id="progressDisp">0</span>%</div>
    
    <div id="hudRight" class="hidden">
        <div style="font-size: 32px; font-family: 'Press Start 2P', monospace;" id="timerDisp">01:30</div>
        <button id="speedBtn" onclick="window.toggleGameSpeed()" style="pointer-events: auto; margin-top: 10px; padding: 5px 15px; background: rgba(0,0,0,0.6); border: 2px solid #b89947; color: #e0d0a0; font-family: 'Press Start 2P'; cursor: pointer; border-radius: 4px;">1X</button>
    </div>

    <div id="mobileDashBtn" class="hidden">DASH</div>
    <div id="statsPanel" class="hidden">
        <div id="statsTitle" style="text-align: center; color: #e0d0a0; font-weight: bold; margin-bottom: 10px; border-bottom: 1px solid #555; padding-bottom: 5px;">능력치</div>
        <div class="stat-line"><span id="lblStatDmg">공격력</span><div class="stat-val" id="statDmg">0 (+0)</div></div>
        <div class="stat-line"><span id="lblStatCool">쿨타임</span><div class="stat-val" id="statCool">0s (-0s)</div></div>
        <div class="stat-line"><span id="lblStatSpd">이동속도</span><div class="stat-val" id="statSpd">0 (+0)</div></div>
    </div>
    <div id="inventory" class="hidden"></div>
    <div id="systemNoticeList" class="hidden"></div>
    <button id="pauseBtn" class="hidden" onclick="window.togglePause()">일시정지 (ESC)</button>
    
    <canvas id="minimapCanvas" class="hidden" width="150" height="150"></canvas>
    <div id="orbPocketUI" class="hidden" style="position: absolute; display: flex; gap: 10px; font-size: 32px; z-index: 10;"></div>

    <div id="lobbyTopBar" class="hidden">
        <div class="currency-badge">💰 <span id="lobbyBadgeDisp">0</span></div>
        <div style="pointer-events: auto; display: flex; flex-direction: column; align-items: flex-end; gap: 8px;">
            <div style="display: flex; align-items: center; gap: 10px;">
                <div style="display: flex; align-items: center; gap: 5px; background: rgba(0,0,0,0.6); padding: 5px 10px; border-radius: 20px; border: 1px solid #555;">
                    <span style="font-size:14px;">🔊</span>
                    <input type="range" id="lobbyVol" min="0" max="1" step="0.05" value="0.5" onchange="window.changeVolume(this.value)" oninput="window.changeVolume(this.value)" style="width: 80px;">
                </div>
                <button id="langBtn" class="btn" style="padding: 10px 20px; font-size: 14px; margin: 0;" onclick="window.toggleLanguage()">🌐 KO</button>
            </div>
            <button id="tutBtn" class="btn" style="padding: 15px 30px; font-size: 24px; margin: 0; background: #2d3436; color: #fff; border: 2px solid #636e72; border-radius: 40px;" onclick="window.openTutorial()">❓ TUTORIAL</button>
        </div>
    </div>
    <div id="lobbyTitle" class="lobby-title hidden">
        <h1 id="lobbyTitleText">Last Girl Survivor<br><span id="lobbySubtitle" style="font-size:1.2rem; color:#ccc;">대역전의 종소리</span></h1>
    </div>
    <div id="lobbyBottomBar" class="hidden">
        <button id="btnStartLobby" class="btn primary" style="font-size: 1.2rem; padding: 15px 30px;" onclick="window.startGame()">출격하기</button>
        <button id="btnUpgradeLobby" class="btn" style="font-size: 1.2rem; padding: 15px 30px; background: #e1b12c;" onclick="window.openUpgrade()">능력치 강화</button>
        <button id="btnClosetLobby" class="btn" style="font-size: 1.2rem; padding: 15px 30px; background: #10ac84; color: white;" onclick="window.openCloset()">옷장 (스킨)</button>
        <button id="btnAchieveLobby" class="btn" style="font-size: 1.2rem; padding: 15px 30px; background: #f39c12; color: white;" onclick="window.openAchieve()">도전과제</button>
        <button id="btnGachaLobby" class="btn" style="font-size: 1.2rem; padding: 15px 30px;" onclick="window.openGacha()">픽업 가챠</button>
        <button id="btnDataLobby" class="btn" style="font-size: 1.2rem; padding: 15px 30px; background: #0984e3; color: white;" onclick="window.openSaveLoad()">데이터 센터</button>
    </div>
    <div id="speechBubble" class="speech-bubble" style="opacity: 0;">빨리 시작하자!</div>

    <div id="tutorialUI" class="overlay hidden">
        <div class="panel" style="max-width: 500px; width: 85%;">
            <h2 id="tutUITitle" style="color: #00d2d3;">TUTORIAL</h2>
            <div id="tutContent" style="min-height: 180px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; background: rgba(0,0,0,0.3); border-radius: 10px; margin: 15px 0;">
                <div id="tutIcon" style="font-size: 60px; margin-bottom: 20px;">⌨️</div>
                <div id="tutDesc" style="line-height: 1.6; color: #fff; font-size: 1.1rem; text-align: center;"></div>
            </div>
            <div style="display: flex; justify-content: center; gap: 20px; margin-top: 10px; align-items: center;">
                <button class="btn" onclick="window.prevTutorialPage()" id="btnTutPrev" style="padding: 10px 15px; font-size: 14px;">◀️</button>
                <span id="tutPageNum" style="color: #ffb142; font-weight: bold; font-family: 'Press Start 2P'; font-size: 12px;">1 / 3</span>
                <button class="btn" onclick="window.nextTutorialPage()" id="btnTutNext" style="padding: 10px 15px; font-size: 14px;">▶️</button>
            </div>
            <button id="tutCloseBtn" class="btn" onclick="window.closeTutorial()" style="margin-top: 20px; background: #555; color: #fff; width: 100%;">닫기</button>
        </div>
    </div>

    <div id="achieveUI" class="overlay hidden"><div class="panel"><h2 id="achieveUITitle">도전과제</h2><div id="achieveList" style="margin:20px 0; max-height:40vh; overflow-y:auto;"></div><button class="btn" onclick="window.closeAchieve()">닫기</button></div></div>
    <div id="closetUI" class="overlay hidden"><div class="panel"><h2 id="closetUITitle">옷장</h2><div id="closetList" style="display:flex; flex-wrap:wrap; gap:10px; justify-content:center; max-height:50vh; overflow-y:auto;"></div><button class="btn" onclick="window.closeCloset()">닫기</button></div></div>
    <div id="upgradeUI" class="overlay hidden"><div class="panel"><h2 id="upgradeUITitle">능력치 강화</h2><div id="upgradeList" style="margin:20px 0;"></div><button class="btn" onclick="window.closeUpgrade()">닫기</button></div></div>
    <div id="pauseUI" class="overlay hidden"><div class="panel"><h2 id="pauseUITitle">일시정지</h2><button class="btn" onclick="window.togglePause()">게임 재개</button><br><button class="btn" style="background:#555; color:#fff;" onclick="window.returnToLobby()">로비로 나가기</button></div></div>
    <div id="levelUpUI" class="overlay hidden"><div class="panel"><h2 id="levelUpTitle">레벨 업!</h2><div class="choice-container" id="choicesBox"></div></div></div>
    <div id="gachaUI" class="overlay hidden"><div class="panel"><h2 id="gachaUITitle">픽업 가챠</h2><button class="btn primary" onclick="window.rollGacha()">1회 뽑기</button><button class="btn" onclick="window.closeGacha()">닫기</button></div></div>
    <div id="gachaResultUI" class="overlay hidden"><div class="panel"><h2 id="gachaResultTitle">획득!</h2><div id="gachaResultCard" class="choice-card premium" style="margin:20px auto;"></div><button class="btn" onclick="document.getElementById('gachaResultUI').classList.add('hidden')">확인</button></div></div>
    <div id="saveLoadUI" class="overlay hidden"><div class="panel"><h2 id="saveUITitle">데이터 센터</h2><div id="slotList" style="margin:20px 0;"></div><button class="btn" onclick="window.closeSaveLoad()">닫기</button></div></div>
    <div id="gameOverUI" class="overlay hidden"><div class="panel"><h1 style="color:#ff4757;">사망했습니다...</h1><button class="btn" onclick="window.returnToLobby()">로비로 돌아가기</button></div></div>
    <div id="stageClearUI" class="overlay hidden"><div class="panel"><h1 style="color:#2ed573;">스테이지 클리어!</h1><button class="btn primary" onclick="window.nextStage()">다음 스테이지</button><button class="btn" onclick="window.returnToLobby()">로비귀환</button></div></div>
    <div id="storyUI" class="overlay hidden"><div class="panel" style="background:transparent; border:none;"><div id="storyText" class="typewriter-text"></div><button id="storyNextBtn" class="btn primary hidden" onclick="window.nextStoryStep()">다음</button></div><button id="storySkipBtn" class="btn skip-btn" onclick="window.skipStory()">Skip</button></div>
    
    <canvas id="gameCanvas"></canvas>
</div>

<script type="module">
const GAME_ASSETS = {
    player: "character_idle.webp", 
    player_run: "character_front_walk_walk_down.webp",
    player_hurt: "character_hurt.webp",
    player_attack: "character_attack.webp",
    player_death: "character_death.webp",
    mob: "", boss: ""    
};
const loadedImages = {};
function loadAssets() {
    for (const [key, srcData] of Object.entries(GAME_ASSETS)) {
        if (srcData && srcData.trim() !== "") {
            const img = new Image();
            img.src = srcData.startsWith('data:') || srcData.startsWith('http') ? srcData : './assets/' + srcData;
            loadedImages[key] = img;
        }
    }
}
loadAssets();

let playerBadges = 0, unlockedWeapons = [], permanentStats = { damage: 0, cooldown: 0, speed: 0, maxHp: 0 }, currentLang = 'ko', maxStageReached = 1, currentOutfitId = 'default1', statsTracking = { totalKills: 0, totalBadges: 0 }, achievements = { kills: false, stage5: false, rich: false };

        let bobY = (animState === 'run') ? Math.abs(Math.sin(performance.now() * 0.01)) * -3 : Math.sin(performance.now() * 0.005) * 1.5;

function nextTutorialPage() { if (currentTutPage < TUTORIAL_DATA.length - 1) { currentTutPage++; renderTutorialPage(); playSFX('exp'); } }
function prevTutorialPage() { if (currentTutPage > 0) { currentTutPage--; renderTutorialPage(); playSFX('exp'); } }
function renderTutorialPage() { const data = TUTORIAL_DATA[currentTutPage], lang = I18N[currentLang]; document.getElementById('tutIcon').innerText = data.icon; document.getElementById('tutUITitle').innerText = lang.tut_title; document.getElementById('tutDesc').innerHTML = lang[data.descKey]; document.getElementById('tutPageNum').innerText = `${currentTutPage + 1} / ${TUTORIAL_DATA.length}`; document.getElementById('btnTutPrev').style.opacity = currentTutPage === 0 ? '0.3' : '1'; document.getElementById('btnTutNext').style.opacity = currentTutPage === TUTORIAL_DATA.length - 1 ? '0.3' : '1'; }

class VerdictOrb { constructor(x, y, data) { this.x = x; this.y = y; this.type = data.type; this.color = data.color; this.glow = data.glow; this.icon = data.icon; this.life = 30.0; this.radius = 15; } update(dt) { this.life -= dt; let dx = player.x - this.x, dy = player.y - this.y, distSq = dx*dx + dy*dy; if (distSq < 10000) { let dist = Math.sqrt(distSq); this.x += (dx/dist) * 300 * dt; this.y += (dy/dist) * 300 * dt; if (dist < player.radius + this.radius) { player.addOrb(this.type); this.life = 0; } } } draw(ctx) { if (isOffScreen(this.x, this.y)) return; ctx.save(); ctx.translate((this.x - camera.x)|0, (this.y - camera.y)|0); ctx.shadowBlur = 15; ctx.shadowColor = this.glow; ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(0, 0, this.radius, 0, Math.PI*2); ctx.fill(); ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke(); ctx.fillStyle = '#fff'; ctx.font = '16px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(this.icon, 0, 0); ctx.restore(); } }
class DamageText { constructor(x, y, amount, isPlayer = false) { this.x = x; this.y = y; this.amount = Math.floor(amount); this.life = 0.5; this.maxLife = 0.5; this.isPlayer = isPlayer; } update(dt) { this.y -= 50 * dt; this.life -= dt; } draw(ctx) { if(isOffScreen(this.x, this.y)) return; ctx.save(); ctx.translate((this.x - camera.x)|0, (this.y - camera.y)|0); ctx.globalAlpha = this.life / this.maxLife; ctx.fillStyle = this.isPlayer ? '#ff4757' : '#fff'; ctx.font = 'bold 16px sans-serif'; ctx.fillText(this.amount, 0, 0); ctx.restore(); } }
class Particle { constructor(x, y, color) { this.x = x; this.y = y; this.color = color; this.vx = (Math.random() - 0.5) * 200; this.vy = (Math.random() - 0.5) * 200; this.life = 0.3; } update(dt) { this.x += this.vx * dt; this.y += this.vy * dt; this.life -= dt; } draw(ctx) { if(isOffScreen(this.x, this.y)) return; ctx.save(); ctx.fillStyle = this.color; ctx.globalAlpha = this.life / 0.3; ctx.beginPath(); ctx.arc((this.x - camera.x)|0, (this.y - camera.y)|0, 3, 0, Math.PI*2); ctx.fill(); ctx.restore(); } }
class ExpGem { constructor(x, y, value) { this.x = x + (Math.random() * 20 - 10); this.y = y + (Math.random() * 20 - 10); this.value = value; this.color = value >= 20 ? '#e84118' : (value > 1 ? '#00a8ff' : '#4cd137'); this.hp = 1; this.isMagnetic = false; } update(dt) { let dx = player.x - this.x, dy = player.y - this.y, distSq = dx*dx + dy*dy; if(distSq < 6400) this.isMagnetic = true; if(this.isMagnetic) { let dist = Math.sqrt(distSq); this.x += (dx/dist) * 400 * dt; this.y += (dy/dist) * 400 * dt; if(dist < 20) { player.gainExp(this.value); this.hp = 0; } } } draw(ctx) { if(isOffScreen(this.x, this.y)) return; ctx.save(); ctx.translate((this.x - camera.x)|0, (this.y - camera.y)|0); ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(0, 0, 4, 0, Math.PI*2); ctx.fill(); ctx.restore(); } }

class Weapon { constructor(id) { this.id = id; this.level = 1; this.timer = 0; this.settings = getWeaponSettings(id); } }
class ProjectileWeapon extends Weapon { update(dt) { this.timer -= dt; if(this.timer <= 0) { this.timer = this.settings.cooldown * player.stats.cooldownMult; let target = findNearestEnemy(); if(target) { player.playAnim('throw'); let dx = target.x - player.x, dy = target.y - player.y, dist = Math.sqrt(dx*dx + dy*dy), vx = (dx/dist) * this.settings.speed, vy = (dy/dist) * this.settings.speed; projectiles.push(new Projectile(player.x, player.y, vx, vy, this.settings.damage * player.getDamageMultiplier(), this.id, this.settings.color, true)); playSFX('shoot'); } } } }
class Projectile { constructor(x, y, vx, vy, damage, type, color, piercing) { this.x = x; this.y = y; this.vx = vx; this.vy = vy; this.damage = damage; this.type = type; this.color = color; this.piercing = piercing; this.life = 2.0; } update(dt) { this.x += this.vx * dt; this.y += this.vy * dt; this.life -= dt; enemies.forEach(e => { let dx = e.x - this.x, dy = e.y - this.y; if(dx*dx + dy*dy < 400) { e.takeDamage(this.damage); if(!this.piercing) this.life = 0; } }); } draw(ctx) { ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc((this.x - camera.x)|0, (this.y - camera.y)|0, 5, 0, Math.PI*2); ctx.fill(); } }

class Player {
    constructor() { this.x = 0; this.y = 0; this.maxHp = 100; this.hp = 100; this.stats = { speedMult: 1.0, damageMult: 1.0, cooldownMult: 1.0 }; this.level = 1; this.exp = 0; this.maxExp = 10; this.weapons = []; this.marblePocket = []; this.marbleBonuses = { damage: 0, maxHp: 0, speed: 0 }; this.dirX = 1; this.animState = 'idle'; this.animTimer = 0; this.hitTimer = 0; this.dashCooldownTimer = 0; this.dashTimer = 0; this.invincibleTimer = 0; this.radius = 15; }
    getDamageMultiplier() { return this.stats.damageMult + (this.marbleBonuses.damage || 0); }
    playAnim(stateName) { this.animState = stateName; this.animTimer = 0.2; }
    recalculateStats() { this.stats.damageMult = 1.0 + (permanentStats.damage * 0.05); this.stats.cooldownMult = 1.0 - (permanentStats.cooldown * 0.02); this.stats.speedMult = 1.0 + (permanentStats.speed * 0.05) + (this.marbleBonuses.speed || 0); this.maxHp = 100 * (1 + (this.marbleBonuses.maxHp || 0)); updateHUD(); }
    addOrb(type) { if (this.marblePocket.length >= 3) this.marblePocket.shift(); this.marblePocket.push(type); this.calculateSynergy(); this.recalculateStats(); updateHUD(); playSFX('levelup'); showSystemNotice(I18N[currentLang].orb_get); }
    calculateSynergy() { this.marbleBonuses = { damage: 0, maxHp: 0, speed: 0 }; if (this.marblePocket.length < 2) return; const counts = { red: 0, yellow: 0, green: 0 }; this.marblePocket.forEach(t => counts[t]++); let synergyApplied = false; Object.keys(counts).forEach(color => { if (counts[color] === 3) { let bonus = 0.25; if (color === 'red') this.marbleBonuses.damage = bonus; else if (color === 'yellow') this.marbleBonuses.maxHp = bonus; else if (color === 'green') this.marbleBonuses.speed = bonus; showSystemNotice(`✨ ${I18N[currentLang].syn_triple}`); synergyApplied = true; } else if (counts[color] === 2) { let bonus = 0.15; if (color === 'red') this.marbleBonuses.damage = bonus; else if (color === 'yellow') this.marbleBonuses.maxHp = bonus; else if (color === 'green') this.marbleBonuses.speed = bonus; showSystemNotice(`✨ ${I18N[currentLang].syn_double}`); synergyApplied = true; } }); if (!synergyApplied && this.marblePocket.length === 3) { this.marbleBonuses.damage = 0.1; this.marbleBonuses.maxHp = 0.1; this.marbleBonuses.speed = 0.1; showSystemNotice(`✨ ${I18N[currentLang].syn_mix}`); } }
    executeDash(dx, dy) { this.dashTimer = 0.25; this.invincibleTimer = 0.25; this.dashCooldownTimer = 2.0; playSFX('dash'); }
    update(dt) { if (this.dashCooldownTimer > 0) this.dashCooldownTimer -= dt; if (this.dashTimer > 0) this.dashTimer -= dt; if (this.invincibleTimer > 0) this.invincibleTimer -= dt; if (this.animTimer > 0) this.animTimer -= dt; if (this.hitTimer > 0) this.hitTimer -= dt; let dx = 0, dy = 0; if(keys['w']) dy -= 1; if(keys['s']) dy += 1; if(keys['a']) { dx -= 1; this.dirX = -1; } if(keys['d']) { dx += 1; this.dirX = 1; } if (joystick.active) { dx = joystick.dx; dy = joystick.dy; if (dx < 0) this.dirX = -1; else if (dx > 0) this.dirX = 1; } let moveMag = Math.hypot(dx, dy); if(moveMag > 0) { dx /= moveMag; dy /= moveMag; } if (this.animTimer <= 0) this.animState = (moveMag > 0) ? 'run' : 'idle'; let currentSpeed = 180 * this.stats.speedMult; if (this.dashTimer > 0) { currentSpeed *= 3.5; } this.x += dx * currentSpeed * dt; this.y += dy * currentSpeed * dt; this.weapons.forEach(w => w.update && w.update(dt)); }
    draw(ctx) { ctx.save(); ctx.translate((this.x - camera.x) | 0, (this.y - camera.y) | 0); drawAdvancedCharacter(ctx, this.dirX, 1.5, this.animState, this.animTimer); ctx.restore(); }
    takeDamage(amount) { if(this.invincibleTimer > 0) return; this.hp -= amount; this.invincibleTimer = 0.5; this.hitTimer = 0.2; updateHUD(); playSFX('hit'); if(this.hp <= 0) { gameState = 'gameover'; document.getElementById('gameOverUI').classList.remove('hidden'); } }
    gainExp(amount) { this.exp += amount; playSFX('exp'); if(this.exp >= this.maxExp) { this.exp -= this.maxExp; this.level++; this.maxExp = Math.floor(this.maxExp * 1.5); triggerLevelUp(); } updateHUD(); }
    checkSynergies() {}
}

class Enemy {
    constructor(x, y, type) { this.x = x; this.y = y; this.type = type; this.radius = type === 'boss' ? 40 : 15; this.hp = type === 'boss' ? 3000 : 20; this.maxHp = this.hp; this.speed = 80; this.damage = 5; this.exp = 1; this.hitTimer = 0; }
    update(dt) { let dx = player.x - this.x, dy = player.y - this.y, dist = Math.sqrt(dx*dx + dy*dy); if(dist > 0) { this.x += (dx/dist) * this.speed * dt; this.y += (dy/dist) * this.speed * dt; } if(dist < this.radius + player.radius && this.hitTimer <= 0) { player.takeDamage(this.damage); this.hitTimer = 0.5; } if(this.hitTimer > 0) this.hitTimer -= dt; }
    draw(ctx) { ctx.fillStyle = this.type === 'boss' ? '#c23616' : '#ff4757'; ctx.beginPath(); ctx.arc((this.x - camera.x)|0, (this.y - camera.y)|0, this.radius, 0, Math.PI*2); ctx.fill(); }
    takeDamage(amount) { if(this.hp <= 0) return; this.hp -= amount; playSFX('hit'); if(this.hp <= 0) { statsTracking.totalKills++; stageKills++; if (stageKills >= 50 && stageMarblesDropped < MAX_MARBLES_PER_STAGE) { stageKills = 0; stageMarblesDropped++; let orbData = MARBLE_TYPES[Math.floor(Math.random() * MARBLE_TYPES.length)]; verdictOrbs.push(new VerdictOrb(this.x, this.y, orbData)); } expGems.push(new ExpGem(this.x, this.y, this.exp)); if(this.type === 'boss' && !isStageCleared) { isStageCleared = true; hitStopTimer = 0.3; screenShake = 30; playSFX('bossKill'); setTimeout(() => triggerStageClear(), 1500); } } }
}

window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; if(e.key === 'Escape' && gameState === 'playing') togglePause(); });
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
window.addEventListener('pointerdown', e => { if(gameState === 'story') nextStoryStep(); else if(gameState === 'lobby') initAudio(); });

function gameLoop(timestamp) {
    try {
        let dt = Math.min(0.1, (timestamp - lastTime) / 1000) * gameSpeedMultiplier; lastTime = timestamp;
        if (hitStopTimer > 0) { hitStopTimer -= dt; dt *= 0.05; }
        if(gameState === 'playing' && !isPaused) {
            stageTime += dt; camera.x += (player.x - gameWidth/2 - camera.x) * 5 * dt; camera.y += (player.y - gameHeight/2 - camera.y) * 5 * dt;
            if(Math.random() < dt) spawnEnemy();
            player.update(dt); enemies.forEach(e => e.update(dt)); verdictOrbs.forEach(o => o.update(dt)); projectiles.forEach(p => p.update(dt)); expGems.forEach(g => g.update(dt)); particles.forEach(p => p.update(dt));
            enemies = enemies.filter(e => e.hp > 0); verdictOrbs = verdictOrbs.filter(o => o.life > 0); projectiles = projectiles.filter(p => p.life > 0); expGems = expGems.filter(g => g.hp !== 0); particles = particles.filter(p => p.life > 0);
            if (frameCount++ % 5 === 0) drawMinimap();
        }
        ctx.clearRect(0,0,gameWidth,gameHeight); drawBackground(ctx, gameState === 'lobby');
        if(gameState === 'playing') { player.draw(ctx); enemies.forEach(e => e.draw(ctx)); verdictOrbs.forEach(o => o.draw(ctx)); projectiles.forEach(p => p.draw(ctx)); expGems.forEach(g => g.draw(ctx)); particles.forEach(p => p.draw(ctx)); }
        else if(gameState === 'lobby') { ctx.save(); ctx.translate(gameWidth/2, gameHeight/2 + 50); drawAdvancedCharacter(ctx, 1, 3, 'idle', 0); ctx.restore(); }
    } catch(e) { console.error(e); }
    gameLoopId = requestAnimationFrame(gameLoop);
}
Object.assign(window, { toggleLanguage, toggleGameSpeed, startStory, nextStoryStep, skipStory, togglePause, returnToLobby, startGame, triggerStageClear, nextStage, resetStage, openTutorial, closeTutorial, nextTutorialPage, prevTutorialPage, renderTutorialPage, changeVolume, rollGacha, openGacha, closeGacha, openUpgrade, closeUpgrade, openSaveLoad, closeSaveLoad, saveToSlot, loadFromSlot, openCloset, closeCloset, equipOutfit, openAchieve, closeAchieve });
startStory(); gameLoopId = requestAnimationFrame(gameLoop);
</script>
